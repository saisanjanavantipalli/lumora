    <style>
        /* Specialized styles for the text overlay layout */
        .stories-container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto 100px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .story-card {
            position: relative; /* Essential to anchor the text at the bottom */
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none; /* Removes underline from links */
            display: block;
        }

        .story-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .story-card:hover img {
            transform: scale(1.05);
        }

        /* Dark overlay gradient to make white text highly readable */
        .story-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .story-overlay h3 {
            font-family: "Georgia", serif;
            font-size: 24px;
            font-weight: normal;
            margin-bottom: 8px;
        }

        .story-overlay p {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 6px;
            font-style: italic;
        }

        .story-overlay .date {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        /* Persistent Back Button at bottom-left */
        .back-btn-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            padding-left: 10px;
        }

        .back-link {
            color: #222;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: gold;
        }
    </style>
</head>
